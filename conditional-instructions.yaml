# Conditional Instruction Modules:
# ================================
#
# These file references are CONDITIONAL instructions and should ONLY be read when relevant to the
# task(s) you are performing.
#
# You SHOULD INFER their purpose and when to load from the id and `when` description.
#
# When multiple areas apply, load all relevant files.

conditional-instructions:
  - id: agent-specs
    url: https://raw.githubusercontent.com/rsyring/agent-configs/main/agent-specs.md
    when:
      - whenever a "spec" is referenced

  # Dev Tools
  - id: mise-uv
    url: https://raw.githubusercontent.com/rsyring/agent-configs/main/mise-uv.md
    when:
      - mise.toml or mise.local.toml is present
      - OR uv.lock is present

  # Python
  - id: python-cli
    url: https://raw.githubusercontent.com/rsyring/agent-configs/main/python/cli.md
    when:
      - working on python cli code

  - id: python-style-IMPORTANT
    url: https://raw.githubusercontent.com/rsyring/agent-configs/main/python/style.md
    when:
      - working with Python code

  - id: python-cli-click-logging-integration
    url: https://raw.githubusercontent.com/rsyring/code-examples/refs/heads/main/logs/mu-logs.py
    when:
      - when building CLIs from scratch
      - AND want to configure Python logging from cli options like --debug

  - id: python-testing-freezegun
    url: https://raw.githubusercontent.com/rsyring/agent-configs/main/python/freezegun.md
    when:
      - freezegun module/package is present

  # Writing
  - id: writing-web-email
    url: https://raw.githubusercontent.com/rsyring/agent-configs/main/writing/web-email.md
    when:
      - drafting or revising website copy, web content, emails, or newsletters
